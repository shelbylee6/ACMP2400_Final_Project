name: 'Terraformer'
description: 'Executes terraform plan and apply steps'
author: 'shelbylee'
inputs:
  ARM_CLIENT_ID:
    description: 'The Azure Client ID'
    required: true
  ARM_CLIENT_SECRET:
    description: 'The Azure Client Secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'The Azure Subscription'
    required: true
  ARM_TENANT_ID:
    description: 'The Azure Tenant ID' 
    required: true
  STATE_KEY: 
    description: 'The unique key for state lookup'
    required: true
  TF_STAGE:
    description: 'The terraform deployment stage'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:                                                   
    INPUT_ARM_CLIENT_ID: ${{ inputs.ARM_CLIENT_ID }}
    INPUT_ARM_CLIENT_SECRET: ${{ inputs.ARM_CLIENT_SECRET }}
    INPUT_ARM_SUBSCRIPTION_ID: ${{ inputs.ARM_SUBSCRIPTION_ID }}
    INPUT_ARM_TENANT_ID: ${{ inputs.ARM_TENANT_ID }}
    INPUT_STATE_KEY: ${{ inputs.STATE_KEY }}
    INPUT_TF_STAGE: ${{ inputs.TF_STAGE }}
